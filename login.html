<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    <link rel="icon" href="{{ url_for('static',filename='img/registration_img.png') }}"> 
</head>
<body>
    <center>
    <h1>Welcome Back!</h1>
    <form method="POST" action="{{ url_for('login') }}">
        <table>
            <tr>
                <td><label for="username" >Username:</label></td> <td><input type="text" name="username" placeholder="Enter your name:"></td>
            </tr>
            <tr>
                <td><label for="password">Password:</label></td> <td><input type="text" name="password" placeholder="Enter your password"></td>
            </tr>
        </table>
        <input type="submit">
    </form>
    </center>
<style>
      table{
        padding: 20px;
      }
      tr{
        padding :5px;
      }
</style>

</body>
</html>
